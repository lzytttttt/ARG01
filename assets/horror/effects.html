<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>H01-H07 — 恐怖效果（纯 CSS / SVG 滤镜）</title>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/oa.css">
<link rel="stylesheet" href="../css/scenes.css">
<link rel="stylesheet" href="../css/horror.css">
<style>
  body { background: #26262b; padding: 40px 24px; }
  .grid { max-width: 1080px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 26px; }
  .demo { background: #2f2f35; border: 1px solid #41414a; padding: 18px; }
  .demo h3 { font-family: var(--font-mono); font-size: 12px; color: #8a9098; font-weight: normal; margin-bottom: 12px; display: flex; justify-content: space-between; }
  .demo h3 button { background: transparent; border: 1px solid #5a5f68; color: #b8bec6; font-size: 11px; padding: 2px 10px; cursor: pointer; }
  .demo h3 button:hover { color: #fff; }
  .stage { background: #1c1d21; min-height: 150px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; padding: 18px; }

  /* H01 演示：迷你 OA 卡片 */
  .mini-oa { width: 240px; background: #fff; font-size: 12px; box-shadow: 0 4px 12px rgba(0,0,0,.4); }
  .mini-oa .h { background: var(--oa-dark-blue); color: #fff; padding: 5px 10px; }
  .mini-oa .r { padding: 6px 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; color: #333; }

  /* H03 演示：迷你走廊灯 */
  .corridor-demo { width: 100%; height: 120px; background: linear-gradient(180deg, #6f7a6a, #4d554a); position: relative; }
  .corridor-demo .light-tube { position: absolute; left: 50%; top: 18px; transform: translateX(-50%); width: 100px; }

  /* H05/H06 演示文本 */
  .ghost-text { color: #d8dce2; font-size: 15px; letter-spacing: 1px; }

  /* H07 演示色板 */
  .swatches { display: flex; gap: 10px; }
  .sw { width: 44px; height: 44px; border: 1px solid #555; }

  /* H02 演示小窗 */
  .mini-window { width: 130px; height: 150px; border: 8px solid #3f444b; background: linear-gradient(180deg, #3a3a4a, #5a5a6a); position: relative; overflow: hidden; }

  /* H04 演示 */
  .big-count { font-family: var(--font-mono); font-size: 22px; color: #c8ccd2; letter-spacing: 3px; }
</style>
</head>
<body>
<div class="grid">

  <div class="demo">
    <h3>H01 · 像素偏移（结局 D）<button onclick="toggle('d1','fx-pixel-shift')">开关</button></h3>
    <div class="stage">
      <div class="mini-oa" id="d1">
        <div class="h">待办中心</div>
        <div class="r"><span>公文审批</span><span class="badge-count">7</span></div>
        <div class="r"><span>工单：渗水报修</span><span>待处理</span></div>
        <div class="r"><span>合同用印</span><span>待处理</span></div>
      </div>
    </div>
  </div>

  <div class="demo">
    <h3>H03 · 走廊灯闪烁<button onclick="toggle('d3','fx-flicker')">开关</button></h3>
    <div class="stage" style="padding:0;">
      <div class="corridor-demo">
        <div class="light-tube" id="d3"></div>
      </div>
    </div>
  </div>

  <div class="demo">
    <h3>H05 · 文字微颤（0.5-1Hz）<button onclick="toggle('d5','fx-text-jitter')">开关</button></h3>
    <div class="stage"><span class="ghost-text" id="d5">陈海平 &nbsp;|&nbsp; 园区物业-配送组 &nbsp;|&nbsp; 状态：离职</span></div>
  </div>

  <div class="demo">
    <h3>H06 · 渐进模糊（30s）<button onclick="replayBlur()">重播</button></h3>
    <div class="stage"><span class="ghost-text" id="d6">赵德柱 &nbsp;|&nbsp; 城市物流-保供配送</span></div>
  </div>

  <div class="demo">
    <h3>H07 · 颜色偏移（±1.5°）<button onclick="toggle('d7','fx-hue-drift')">开关</button></h3>
    <div class="stage">
      <div class="swatches" id="d7">
        <div class="sw" style="background:#1a56db;"></div>
        <div class="sw" style="background:#52c41a;"></div>
        <div class="sw" style="background:#fa8c16;"></div>
        <div class="sw" style="background:#e34d59;"></div>
      </div>
    </div>
  </div>

  <div class="demo">
    <h3>H02 · 雨水（窗玻璃流淌）</h3>
    <div class="stage">
      <div class="mini-window" data-glass-rain="8"></div>
    </div>
  </div>

  <div class="demo">
    <h3>H04 · 倒计时钟</h3>
    <div class="stage"><span class="big-count" id="cd">00:23:41</span></div>
  </div>

</div>

<script src="../js/rain.js"></script>
<script>
  function toggle(id, cls) { document.getElementById(id).classList.toggle(cls); }
  function replayBlur() {
    var el = document.getElementById('d6');
    el.classList.remove('fx-slow-blur');
    void el.offsetWidth;
    el.classList.add('fx-slow-blur');
  }
  // H04：从 00:23:41 开始倒数
  (function () {
    var t = 23 * 60 + 41;
    var el = document.getElementById('cd');
    setInterval(function () {
      if (t > 0) t--;
      var s = ('0' + Math.floor(t / 3600)).slice(-2) + ':' +
              ('0' + Math.floor(t % 3600 / 60)).slice(-2) + ':' +
              ('0' + (t % 60)).slice(-2);
      el.textContent = s;
    }, 1000);
  })();
</script>
</body>
</html>
