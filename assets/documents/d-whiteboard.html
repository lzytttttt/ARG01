<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>白板 · 临川民生集团项目进度表</title>
<style>
  .wb { max-width: 680px; margin: 0 auto; background: #e8e6df; color: #2a2a2a; padding: 24px 26px; box-shadow: 0 8px 30px rgba(0,0,0,.4); border: 1px solid #d2cec0; }
  .wb h3 { font-size: 14px; letter-spacing: 2px; text-align: center; margin-bottom: 4px; }
  .wb .sub { text-align: center; font-size: 11px; color: #7a7468; margin-bottom: 16px; }
  .wb .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  .wb .col { border: 1px solid #cfcabb; background: #f6f4ec; min-height: 150px; padding: 8px 7px; font-size: 11px; line-height: 1.7; }
  .wb .yr { font-weight: 700; text-align: center; border-bottom: 1px solid #cfcabb; padding-bottom: 4px; margin-bottom: 6px; }
  .wb .note { display: block; padding: 3px 5px; margin-bottom: 4px; border-radius: 2px; }
  .y20 { background: #ffe066; } .y21 { background: #f3d166; } .y22 { background: #d9c478; } .y23 { background: #b8a86a; } .y24 { background: #9a8e62; }
  .wb .arrow { margin-top: 12px; font-size: 12px; color: #b5483a; text-align: center; position: relative; font-weight: 600; }
  .wb .arrow .scratch { position: absolute; left: 28%; right: 28%; top: 48%; height: 3px; background: #b5483a; transform: rotate(2deg); }
  .wb .foot { margin-top: 14px; font-size: 11px; color: #8a8478; border-top: 1px dashed #cfc8b8; padding-top: 8px; line-height: 1.7; }
</style>
</head>
<body>
<div class="wb">
  <h3>临川民生集团项目进度表</h3>
  <div class="sub">307 室白板 · 2020–2025</div>
  <div class="grid">
    <div class="col"><div class="yr">2020</div><span class="note y20">上线</span><span class="note y20">数据补录</span><span class="note y20">BUG 修复</span></div>
    <div class="col"><div class="yr">2021</div><span class="note y21">统一人员平台</span></div>
    <div class="col"><div class="yr">2022</div><span class="note y22">规则变更</span></div>
    <div class="col"><div class="yr">2023</div><span class="note y23">默言上线</span></div>
    <div class="col"><div class="yr">2024</div><span class="note y24">默言自动审批上线</span><span class="note y24" style="background:transparent;border:1px dashed #9a8e62;">（空白·未写）</span></div>
    <div class="col"><div class="yr">2025</div><span style="color:#aaa;">—</span></div>
  </div>
  <div class="arrow">默言 ⟶ ？？？<span class="scratch"></span></div>
</div>
</body>
</html>
