<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>D03 — 2020 开发群聊天截图</title>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/docs.css">
<style>
  body {
    min-height: 100vh;
    background: #2e3136;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }
  .caption { margin-top: 18px; color: #8a9098; font-size: 12px; text-align: center; line-height: 1.8; }
</style>
</head>
<body>
<div>
  <div class="chat-screenshot">
    <div class="chat-statusbar"><span>03:17</span><span>4G ▂▄▆ ▮</span></div>
    <div class="chat-header">临川民生 OA-应急模块 (3人)</div>
    <div class="chat-body">
      <div class="chat-msg other">
        <div class="avatar">后端</div>
        <div>
          <div class="meta">后端-小周</div>
          <div class="bubble">这个状态到底叫"失联"还是"已处理"？<span class="time">03:17</span></div>
        </div>
      </div>
      <div class="chat-msg self">
        <div class="avatar">项</div>
        <div>
          <div class="meta" style="text-align:right;">项目经理</div>
          <div class="bubble">领导看报表不想看到失联，先写已处理。<span class="time">03:17</span></div>
        </div>
      </div>
      <div class="chat-msg other">
        <div class="avatar">后端</div>
        <div>
          <div class="meta">后端-小周</div>
          <div class="bubble">那实际没处理怎么办？<span class="time">03:18</span></div>
        </div>
      </div>
      <div class="chat-msg self">
        <div class="avatar">项</div>
        <div>
          <div class="meta" style="text-align:right;">项目经理</div>
          <div class="bubble">备注里留一下，后面再补。<span class="time">03:18</span></div>
        </div>
      </div>
      <div class="chat-system">该群已于 2023 年解散。成员 3/3 已离开项目。</div>
    </div>
  </div>
  <div class="caption">D03 · 2020 年 2 月，应急模块上线前夜。<br>"那一天，第一个谎言。"</div>
</div>
</body>
</html>
