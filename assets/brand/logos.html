<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>L01-L03 — 品牌与 LOGO（SVG 矢量）</title>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/oa.css">
<style>
  body { background: #e8eaed; padding: 40px 24px; }
  .grid { max-width: 1080px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 28px; }
  .card { background: #fff; border: 1px solid #d5d9de; padding: 34px 24px 22px; display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .card .code { align-self: flex-start; font-family: var(--font-mono); font-size: 11px; color: #9aa0a8; }
  .card .desc { font-size: 12px; color: #888; text-align: center; line-height: 1.7; }
  .dark-strip { background: #2b2f36; width: 100%; padding: 12px; display: flex; justify-content: center; }
</style>
</head>
<body>
<div class="grid">

  <!-- L01 临川民生集团 LOGO：圆形徽章，国企蓝，桥梁+水波 -->
  <div class="card">
    <span class="code">L01 · 临川民生集团</span>
    <svg width="180" height="180" viewBox="0 0 120 120">
      <circle cx="60" cy="60" r="56" fill="#1a56db"/>
      <circle cx="60" cy="60" r="48" fill="#fff"/>
      <circle cx="60" cy="60" r="44" fill="#1a56db"/>
      <!-- 齿轮感内环 -->
      <circle cx="60" cy="60" r="38" fill="none" stroke="#fff" stroke-width="1.4" stroke-dasharray="4 3.2"/>
      <!-- 桥梁 -->
      <path d="M30,62 Q60,34 90,62" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="38" y1="56" x2="38" y2="64" stroke="#fff" stroke-width="2.4"/>
      <line x1="60" y1="47" x2="60" y2="64" stroke="#fff" stroke-width="2.4"/>
      <line x1="82" y1="56" x2="82" y2="64" stroke="#fff" stroke-width="2.4"/>
      <!-- 水波：临川的水 / 民生的川流 -->
      <path d="M32,72 q7,-6 14,0 t14,0 t14,0 t14,0" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <path d="M39,82 q7,-6 14,0 t14,0 t14,0" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity=".8"/>
    </svg>
    <div style="font-family:var(--font-hei); font-size:22px; color:#1a56db; letter-spacing:6px;">临川民生集团</div>
    <div style="font-family:var(--font-mono); font-size:10px; color:#9aa0a8; letter-spacing:2px;">LINCHUAN MINSHENG GROUP</div>
    <div class="desc">圆形徽章 + 桥梁/水波，国企蓝 #1a56db。<br>用于 OA 顶栏、登录页、公文页眉。</div>
  </div>

  <!-- L02 启衡信息 LOGO：启衡 + 水平线，业余感 -->
  <div class="card">
    <span class="code">L02 · 启衡信息</span>
    <svg width="200" height="120" viewBox="0 0 200 120">
      <text x="46" y="58" font-family="SimHei, 黑体, sans-serif" font-size="44" fill="#2288aa" transform="rotate(-1 100 60)">启</text>
      <text x="102" y="61" font-family="SimHei, 黑体, sans-serif" font-size="44" fill="#2288aa" transform="rotate(-1 100 60)">衡</text>
      <!-- 不必完美对齐的水平线 -->
      <line x1="40" y1="76" x2="166" y2="73" stroke="#2288aa" stroke-width="2.5" opacity=".85"/>
      <text x="43" y="96" font-family="Courier New, monospace" font-size="11" fill="#7a8a94" letter-spacing="3" transform="rotate(-.6 100 90)">QIHENG INFO.</text>
    </svg>
    <div class="desc">蓝绿 #2288aa，线条故意不完全对齐——<br>一家小公司的"业余感"。用于 307 门牌、合同乙方。</div>
  </div>

  <!-- L03 Apocalyptic /α\ 标志 -->
  <div class="card">
    <span class="code">L03 · Apocalyptic /α\</span>
    <svg width="180" height="90" viewBox="0 0 36 18" style="background:#f4f4f4; border:1px dashed #ccc; padding:18px 60px; width:216px; height:72px;">
      <text x="0"  y="14" font-family="serif" font-size="16" fill="#777">/</text>
      <text x="10" y="14" font-family="serif" font-size="16" fill="#777" font-style="italic">α</text>
      <text x="26" y="14" font-family="serif" font-size="16" fill="#777">\</text>
    </svg>
    <div class="dark-strip">
      <span class="apocalyptic-logo">Powered by Cthu / Apocalyptic <span class="alpha">/α\</span></span>
    </div>
    <div class="desc">不需要"设计"——它就是用字符画出来的。<br>灰 #777/#999，10-12px，用于 OA 底部水印、技术文档页脚、合同最后一页。</div>
  </div>

</div>
</body>
</html>
