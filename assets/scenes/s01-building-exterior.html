<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>S01 — 科技市场大楼外部（雨天·傍晚 18:30）</title>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/scenes.css">
<link rel="stylesheet" href="../css/horror.css">
<style>
  .s01 { background: linear-gradient(180deg, #84898f 0%, #a8adb2 45%, #c2c6ca 62%, #6d7175 100%); }

  /* 远处楼影 */
  .far { position: absolute; bottom: 26%; background: #5f6468; opacity: .55; }
  .far.f1 { left: 2%;  width: 15%; height: 30%; }
  .far.f2 { right: 4%; width: 18%; height: 36%; opacity: .45; }
  .far.f3 { left: 70%; width: 10%; height: 24%; opacity: .4; }

  /* 主楼：米灰色瓷砖外墙 + 斑驳 */
  .building {
    position: absolute;
    left: 20%; bottom: 14%;
    width: 46%; height: 58%;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(90, 80, 60, .18), transparent 45%),
      radial-gradient(ellipse at 75% 55%, rgba(70, 70, 60, .22), transparent 40%),
      radial-gradient(ellipse at 50% 90%, rgba(60, 55, 45, .25), transparent 50%),
      repeating-linear-gradient(0deg,
        #d4c9b8 0px, #d4c9b8 48px,
        #c4b9a8 48px, #c4b9a8 50px);
    box-shadow: 0 0 0 1px #a89d8c, 12px 0 24px rgba(0, 0, 0, .25);
  }
  /* 女儿墙 */
  .building::before {
    content: "";
    position: absolute; left: -1%; right: -1%; top: -3.5%;
    height: 3.5%;
    background: #b3a897;
    border-bottom: 2px solid #9a8f7e;
  }

  /* 窗户阵列：深色矩形 + 室内暗影 */
  .windows {
    position: absolute; left: 7%; right: 7%; top: 8%;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 12% 8%;
    height: 62%;
  }
  .win {
    position: relative;
    background: linear-gradient(160deg, #23262b 0%, #2e3136 60%, #26292e 100%);
    box-shadow: inset 0 0 12px rgba(0, 0, 0, .8), 0 1px 0 rgba(255, 255, 255, .15);
    border: 2px solid #8f8574;
  }
  /* 窗下雨水锈痕 */
  .win::after {
    content: "";
    position: absolute; left: 20%; right: 20%; top: 100%;
    height: 26px;
    background: linear-gradient(to bottom, rgba(110, 90, 60, .28), transparent);
  }
  .win.lit { background: linear-gradient(160deg, #4a4436, #5c5340); }
  .win.lit::before {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 60%, rgba(220, 200, 140, .28), transparent 70%);
  }
  .win.broken { clip-path: polygon(0 0, 100% 0, 100% 100%, 55% 100%, 40% 62%, 0 78%); }

  /* 褪色灯箱招牌 */
  .sign {
    position: absolute;
    left: 10%; top: 74%;
    width: 56%; height: 9%;
    background: linear-gradient(180deg, #b9b2a2, #a39c8c);
    border: 2px solid #857d6d;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6%;
    box-shadow: inset 0 0 18px rgba(0, 0, 0, .25);
  }
  .sign span {
    font-family: var(--font-hei);
    font-size: 26px;
    color: #a03a30;
    text-shadow: 0 0 8px rgba(220, 120, 100, .35);
    letter-spacing: 4px;
  }
  .sign span.dead { color: #6e443e; text-shadow: none; opacity: .6; }

  /* 一楼：卷帘门 + 一家还亮着的店 */
  .shops {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 17%;
    display: flex;
    border-top: 3px solid #8f8574;
  }
  .shops .shutter { flex: 1; border-right: 2px solid #5c6165; }
  .shop-open {
    flex: 1;
    position: relative;
    background: linear-gradient(180deg, #3a352c, #2a2721);
    border-right: 2px solid #5c6165;
  }
  .shop-open::before {
    content: "";
    position: absolute; inset: 12% 18%;
    background: radial-gradient(ellipse at 50% 100%, rgba(230, 210, 150, .30), rgba(60, 55, 40, .2) 75%);
  }
  .shop-open .shop-sign {
    position: absolute; top: 4%; left: 50%;
    transform: translateX(-50%);
    font-size: 10px; color: #cfc39a;
    letter-spacing: 2px; white-space: nowrap;
  }

  /* 街道与积水 */
  .street {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 14%;
    background: linear-gradient(180deg, #3f4245 0%, #2c2f33 100%);
  }
  .puddle {
    position: absolute; bottom: 12%;
    border-radius: 50%;
    background: linear-gradient(180deg, rgba(150, 158, 165, .5), rgba(90, 96, 102, .35));
    filter: blur(1px);
    overflow: hidden;
  }
  .puddle::before {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 35% 30%, rgba(200, 205, 210, .35), transparent 55%);
    animation: puddleShimmer 4s ease-in-out infinite;
  }
  .p1 { left: 14%; width: 30%; height: 58%; }
  .p2 { left: 58%; width: 24%; height: 44%; }
  .p2::after {
    content: "";
    position: absolute; left: 10%; top: 20%;
    width: 40%; height: 30%;
    background: rgba(160, 58, 48, .18);  /* 招牌红光的倒影 */
    filter: blur(4px);
  }
  @keyframes puddleShimmer {
    0%, 100% { opacity: .7; }
    50%      { opacity: 1; }
  }

  /* 雨幕低霭 */
  .mist {
    position: absolute; left: 0; right: 0; bottom: 10%;
    height: 12%;
    background: linear-gradient(to bottom, transparent, rgba(200, 206, 210, .14));
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="scene s01 vignette">
  <div class="far f1"></div>
  <div class="far f2"></div>
  <div class="far f3"></div>

  <div class="building">
    <div class="windows">
      <div class="win"></div><div class="win"></div><div class="win"></div><div class="win broken"></div>
      <div class="win"></div><div class="win lit"></div><div class="win"></div><div class="win"></div>
      <div class="win"></div><div class="win"></div><div class="win"></div><div class="win"></div>
    </div>
    <div class="sign"><span>科</span><span>技</span><span class="dead">市</span><span>场</span></div>
    <div class="shops">
      <div class="shutter"></div>
      <div class="shop-open"><div class="shop-sign">二手笔记本·监控器材</div></div>
      <div class="shutter"></div>
      <div class="shutter"></div>
    </div>
  </div>

  <div class="street">
    <div class="puddle p1"></div>
    <div class="puddle p2"></div>
  </div>
  <div class="mist"></div>
  <div class="rain-field" data-rain="110"></div>
</div>
<script src="../js/rain.js"></script>
</body>
</html>
