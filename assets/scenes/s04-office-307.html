<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>S04 — 307 室全景</title>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/scenes.css">
<link rel="stylesheet" href="../css/horror.css">
<style>
  .s04 { background: #14161a; }

  /* 后墙与左侧渗水墨渍 */
  .backwall {
    position: absolute; left: 0; right: 0; top: 0; height: 62%;
    background:
      radial-gradient(ellipse at 8% 20%, rgba(116, 96, 58, .25), transparent 30%),
      linear-gradient(180deg, #a3a294 0%, #8f8e80 100%);
  }
  .stain-wall { left: 2%; top: 4%; width: 14%; height: 34%; }

  /* 大窗 + 半拉窗帘 + 玻璃雨痕 */
  .window {
    position: absolute; left: 26%; top: 6%;
    width: 34%; height: 46%;
    border: 8px solid #4a4f55;
    background: linear-gradient(180deg, #7a8a9a 0%, #9aa4ad 70%, #8a939b 100%);
    overflow: hidden;
    box-shadow: inset 0 0 30px rgba(0, 0, 0, .3);
  }
  .window .mullion-v { position: absolute; left: 50%; top: 0; bottom: 0; width: 6px; margin-left: -3px; background: #4a4f55; }
  .window .mullion-h { position: absolute; top: 50%; left: 0; right: 0; height: 6px; margin-top: -3px; background: #4a4f55; }
  .window .cityline {
    position: absolute; bottom: 0; left: 0; right: 0; height: 34%;
    background:
      linear-gradient(0deg, #4a4a50 0 55%, transparent 55%),
      repeating-linear-gradient(90deg, transparent 0 18px, rgba(255, 220, 140, .35) 18px 20px, transparent 20px 46px);
    opacity: .8;
  }
  .curtain-l { left: 24.5%; top: 5%; width: 7%; height: 49%; }
  .curtain-r { left: 55%; top: 5%; width: 4.5%; height: 49%; animation-delay: -3s; }

  /* 地面 */
  .floor307 {
    position: absolute; left: 0; right: 0; bottom: 0; height: 38%;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(200, 202, 190, .12), transparent 60%),
      linear-gradient(180deg, #74756d 0%, #5e5f58 100%);
  }

  /* 六张桌子：两排三列 */
  .desk {
    position: absolute;
    width: 15%; height: 9%;
    background: linear-gradient(180deg, #c9c9c4 0%, #b3b3ad 85%, #8f8f89 100%);
    box-shadow: 0 6px 10px rgba(0, 0, 0, .35);
  }
  .desk::before, .desk::after {
    content: ""; position: absolute; top: 100%;
    width: 5%; height: 160%;
    background: #6a6a64;
  }
  .desk::before { left: 4%; } .desk::after { right: 4%; }
  .r1 { top: 46%; } .r2 { top: 63%; }
  .c1 { left: 8%; } .c2 { left: 30%; } .c3 { left: 52%; }

  /* 显示器 */
  .monitor {
    position: absolute; left: 50%; bottom: 100%;
    width: 46%; height: 78%;
    transform: translateX(-50%);
  }
  .monitor .screen {
    position: absolute; inset: 0 0 18% 0;
    border: 3px solid #26282c;
    border-radius: 2px;
    background: #c8d6e5;
    box-shadow: 0 0 14px rgba(160, 190, 220, .25);
  }
  .monitor .screen::before {  /* 待机桌面的极简暗示 */
    content: ""; position: absolute; left: 6%; right: 6%; top: 8%; height: 10%;
    background: rgba(90, 120, 150, .35);
  }
  .monitor .screen::after {
    content: ""; position: absolute; left: 6%; top: 26%; bottom: 12%; width: 30%;
    background: repeating-linear-gradient(0deg, rgba(90, 120, 150, .25) 0 3px, transparent 3px 8px);
  }
  .monitor .stand {
    position: absolute; left: 42%; right: 42%; top: 82%; bottom: 0;
    background: #26282c;
  }
  /* 碎裂的屏幕：clip-path 切角 + SVG 裂缝 */
  .monitor.broken .screen {
    background: #17191d;
    box-shadow: none;
    clip-path: polygon(0 0, 100% 0, 100% 72%, 72% 100%, 0 100%);
  }
  .monitor.broken .cracks {
    position: absolute; inset: 0 0 18% 0;
    pointer-events: none;
  }
  .monitor.tilted { transform: translateX(-50%) rotate(-7deg); }

  /* 键盘 */
  .kb {
    position: absolute; left: 22%; top: 104%;
    width: 38%; height: 26%;
    background:
      repeating-linear-gradient(90deg, rgba(70, 70, 75, .5) 0 3px, transparent 3px 6px),
      #9a9a94;
    border: 1px solid #77777A;
    transform: rotate(2deg);
  }
  .kb.fallen { transform: rotate(24deg); top: 128%; left: 60%; }

  /* 椅子 */
  .chair {
    position: absolute; top: 108%; left: 30%;
    width: 22%; height: 55%;
    background: linear-gradient(180deg, #3c3f45, #2c2e33);
    border-radius: 3px 3px 0 0;
    opacity: .9;
  }

  /* 桌面杂物 */
  .cup {
    position: absolute; left: 8%; top: 18%;
    width: 9%; height: 42%;
    background: linear-gradient(90deg, #b8b4ac, #d4d0c8, #b0aca4);
    border-radius: 0 0 3px 3px;
  }
  .cup::after {
    content: ""; position: absolute; left: -45%; top: 90%;
    width: 190%; height: 60%;
    background: radial-gradient(ellipse, rgba(92, 64, 40, .4) 20%, transparent 70%);
    filter: blur(1px);
  }
  .plant { position: absolute; right: 6%; top: -30%; width: 22%; height: 130%; }

  /* 玻璃隔断办公室（右后角） */
  .glass-office {
    position: absolute; right: 3%; top: 10%;
    width: 26%; height: 56%;
    border: 2px solid rgba(170, 175, 180, .5);
    background: rgba(200, 210, 220, .06);
    box-shadow: inset 0 0 40px rgba(0, 0, 0, .25);
  }
  .glass-office::before {  /* 玻璃反光高光条 */
    content: ""; position: absolute; left: 12%; top: 0; bottom: 0;
    width: 5%;
    background: linear-gradient(180deg, rgba(230, 238, 245, .14), transparent);
    transform: skewX(-6deg);
  }
  .glass-office .frame-h { position: absolute; left: 0; right: 0; top: 50%; height: 2px; background: rgba(170, 175, 180, .45); }
  .glass-office .inner-desk {
    position: absolute; left: 18%; bottom: 12%;
    width: 56%; height: 16%;
    background: linear-gradient(180deg, #8f8a80, #6f6a60);
  }
  .glass-office .inner-monitor {
    position: absolute; left: 34%; bottom: 28%;
    width: 20%; height: 14%;
    background: #33507a;
    box-shadow: 0 0 12px rgba(80, 130, 200, .5);
    border: 2px solid #1c1e22;
  }
  .glass-office .lamp-glow {
    position: absolute; right: 8%; bottom: 24%;
    width: 34%; height: 34%;
    background: radial-gradient(circle, rgba(255, 240, 210, .40), transparent 70%);
  }
  .glass-office .name-tag {
    position: absolute; left: 6%; top: 30%;
    background: var(--oa-blue); color: #fff;
    font-size: 10px; padding: 2px 8px;
    letter-spacing: 1px;
    transform: scale(.9);
  }

  /* 文件柜：门开着，文件夹被翻乱 */
  .cabinet {
    position: absolute; left: 73%; top: 26%;
    width: 9%; height: 34%;
    background: linear-gradient(90deg, #7e8288, #9aa0a6, #7e8288);
    border: 1px solid #5c6165;
  }
  .cabinet .shelf {
    position: absolute; left: 8%; right: 8%;
    height: 4%;
    background: #4a4e52;
  }
  .cabinet .folders {
    position: absolute; left: 10%; right: 10%;
    background: repeating-linear-gradient(90deg,
      #a8524a 0 4px, #4a6a8a 4px 8px, #8a7a4a 8px 12px, #6a6a6a 12px 15px);
    transform: rotate(-2deg);
  }
  .cabinet .door-open {
    position: absolute; left: -46%; top: 0;
    width: 46%; height: 100%;
    background: linear-gradient(90deg, #6e7276, #8a9094);
    transform: perspective(120px) rotateY(28deg);
    transform-origin: right center;
    border: 1px solid #54585c;
  }

  /* 散落的打印纸/发票/快递信封 */
  .pp1 { left: 20%; top: 82%; width: 5%; height: 7%; transform: rotate(14deg); }
  .pp2 { left: 44%; top: 88%; width: 6%; height: 8%; transform: rotate(-9deg); }
  .pp3 { left: 63%; top: 80%; width: 4.5%; height: 6.5%; transform: rotate(31deg); }
  .pp4 { left: 78%; top: 90%; width: 5.5%; height: 7%; transform: rotate(-19deg); background: linear-gradient(175deg, #d8cbb0, #c9bcA0); }
  .pp5 { left: 33%; top: 93%; width: 4%; height: 5.5%; transform: rotate(52deg); }
</style>
</head>
<body>
<div class="scene s04 vignette cold-overlay">
  <div class="backwall">
    <div class="water-stain drip stain-wall"></div>
  </div>

  <div class="window" data-glass-rain="10">
    <div class="cityline"></div>
    <div class="mullion-v"></div>
    <div class="mullion-h"></div>
  </div>
  <div class="curtain curtain-l"></div>
  <div class="curtain curtain-r"></div>

  <div class="floor307"></div>

  <!-- 第一排：三张桌子，两台亮屏一台碎屏 -->
  <div class="desk r1 c1">
    <div class="monitor"><div class="screen"></div><div class="stand"></div></div>
    <div class="kb"></div>
    <div class="cup"></div>
    <div class="chair"></div>
  </div>
  <div class="desk r1 c2">
    <div class="monitor broken tilted">
      <div class="screen"></div>
      <svg class="cracks" viewBox="0 0 100 60" preserveAspectRatio="none">
        <polyline points="50,4 44,22 52,34 40,52" stroke="#5a5e64" stroke-width="1" fill="none"/>
        <polyline points="44,22 28,30 12,28" stroke="#4a4e54" stroke-width=".8" fill="none"/>
        <polyline points="52,34 70,40 88,36" stroke="#4a4e54" stroke-width=".8" fill="none"/>
        <polyline points="50,4 62,14 78,12" stroke="#3c4046" stroke-width=".7" fill="none"/>
      </svg>
      <div class="stand"></div>
    </div>
    <div class="kb fallen"></div>
    <div class="chair" style="transform: rotate(-14deg); left: 55%;"></div>
  </div>
  <div class="desk r1 c3">
    <div class="monitor"><div class="screen"></div><div class="stand"></div></div>
    <div class="kb"></div>
    <div class="plant">
      <svg viewBox="0 0 40 60" width="100%" height="100%">
        <polygon points="8,38 32,38 28,58 12,58" fill="#8B7355"/>
        <path d="M20,38 Q18,26 15,14 Q14,8 16,2" stroke="#6b5b3a" stroke-width="1.5" fill="none"/>
        <path d="M20,38 Q23,24 26,16" stroke="#6b5b3a" stroke-width="1" fill="none"/>
        <path d="M20,38 Q17,30 10,24" stroke="#6b5b3a" stroke-width="1" fill="none"/>
        <ellipse cx="14" cy="10" rx="4" ry="1.5" fill="#7a6b4a" transform="rotate(-30,14,10)"/>
        <ellipse cx="19" cy="4" rx="3" ry="1" fill="#6b5b3a" transform="rotate(15,19,4)"/>
        <ellipse cx="26" cy="14" rx="3" ry="1.2" fill="#7a6b4a" transform="rotate(40,26,14)"/>
      </svg>
    </div>
  </div>

  <!-- 第二排：三张桌子，一台亮屏一台碎屏一张空桌 -->
  <div class="desk r2 c1">
    <div class="monitor"><div class="screen"></div><div class="stand"></div></div>
    <div class="kb"></div>
    <div class="chair"></div>
  </div>
  <div class="desk r2 c2">
    <div class="monitor broken">
      <div class="screen"></div>
      <svg class="cracks" viewBox="0 0 100 60" preserveAspectRatio="none">
        <polyline points="30,2 42,18 38,36 50,56" stroke="#5a5e64" stroke-width="1" fill="none"/>
        <polyline points="42,18 60,24 76,20" stroke="#4a4e54" stroke-width=".8" fill="none"/>
        <polyline points="38,36 22,44 8,42" stroke="#3c4046" stroke-width=".7" fill="none"/>
      </svg>
      <div class="stand"></div>
    </div>
    <div class="kb" style="transform: rotate(-6deg);"></div>
  </div>
  <div class="desk r2 c3">
    <div class="chair" style="left: 38%;"></div>
  </div>

  <!-- 玻璃隔断办公室：整个 307 唯一的暖色光源在里面 -->
  <div class="glass-office">
    <div class="frame-h"></div>
    <div class="inner-desk"></div>
    <div class="inner-monitor"></div>
    <div class="lamp-glow"></div>
    <div class="name-tag">敖曼 产品经理</div>
  </div>

  <!-- 文件柜 -->
  <div class="cabinet">
    <div class="shelf" style="top: 24%;"></div>
    <div class="shelf" style="top: 48%;"></div>
    <div class="shelf" style="top: 72%;"></div>
    <div class="folders" style="top: 6%; height: 18%;"></div>
    <div class="folders" style="top: 30%; height: 18%; transform: rotate(3deg);"></div>
    <div class="folders" style="top: 54%; height: 12%; opacity: .7;"></div>
    <div class="door-open"></div>
  </div>

  <!-- 散落的纸张 -->
  <div class="loose-paper pp1"></div>
  <div class="loose-paper pp2"></div>
  <div class="loose-paper pp3"></div>
  <div class="loose-paper pp4"></div>
  <div class="loose-paper pp5"></div>
</div>
<script src="../js/rain.js"></script>
</body>
</html>
