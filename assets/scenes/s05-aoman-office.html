<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>S05 — 敖曼办公室（玻璃隔间内·发现字条）</title>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/scenes.css">
<link rel="stylesheet" href="../css/horror.css">
<style>
  .s05 { background: radial-gradient(ellipse at 60% 40%, #23262c 0%, #101215 70%); }

  /* 玻璃门框（左侧，门半开着） */
  .glass-door {
    position: absolute; left: 6%; top: 8%;
    width: 10%; height: 74%;
    border: 3px solid rgba(160, 168, 175, .55);
    border-right: none;
    background: linear-gradient(105deg, rgba(210, 220, 230, .10) 0%, rgba(210, 220, 230, .02) 40%);
    transform: perspective(300px) rotateY(14deg);
    transform-origin: left center;
  }
  .glass-door .name-tag {
    position: absolute; left: 18%; top: 26%;
    background: var(--oa-blue); color: #fff;
    font-size: 11px; padding: 3px 9px; letter-spacing: 1px;
    box-shadow: 0 1px 3px rgba(0, 0, 0, .5);
  }
  .glass-door .handle {
    position: absolute; right: 6%; top: 48%;
    width: 5px; height: 14%;
    background: #9aa0a6; border-radius: 3px;
  }

  /* 大桌子 */
  .desk-main {
    position: absolute; left: 26%; top: 52%;
    width: 56%; height: 16%;
    background: linear-gradient(180deg, #7d7466 0%, #5f584c 90%, #49433a 100%);
    box-shadow: 0 10px 24px rgba(0, 0, 0, .55);
  }
  .desk-main::before, .desk-main::after {
    content: ""; position: absolute; top: 100%;
    width: 4%; height: 150%;
    background: #3c372f;
  }
  .desk-main::before { left: 6%; } .desk-main::after { right: 6%; }

  /* 桌上的暖光池：整个 307 唯一的暖色光源 */
  .warm-pool {
    position: absolute; left: 52%; top: 42%;
    width: 34%; height: 26%;
    background: radial-gradient(ellipse at 70% 60%, rgba(255, 240, 210, .38), rgba(255, 240, 210, .10) 55%, transparent 75%);
    pointer-events: none;
    z-index: 4;
  }

  /* 台灯 */
  .lamp {
    position: absolute; left: 70%; top: 34%;
    width: 10%; height: 20%;
    z-index: 3;
  }
  .lamp .base {
    position: absolute; bottom: 0; left: 30%;
    width: 40%; height: 10%;
    background: #2e2a24; border-radius: 50%;
  }
  .lamp .arm {
    position: absolute; bottom: 8%; left: 46%;
    width: 4%; height: 62%;
    background: #3a352c;
    transform: rotate(12deg);
    transform-origin: bottom center;
  }
  .lamp .head {
    position: absolute; top: 8%; left: 52%;
    width: 34%; height: 24%;
    background: linear-gradient(180deg, #4a4438, #322d24);
    border-radius: 40% 40% 50% 50%;
    transform: rotate(24deg);
  }
  .lamp .head::after {
    content: ""; position: absolute; left: 15%; right: 15%; bottom: -12%;
    height: 30%;
    background: radial-gradient(ellipse, rgba(255, 236, 190, .9), transparent 70%);
    filter: blur(2px);
  }

  /* 亮着的电脑屏幕：OA 登录页的缩略 */
  .screen-big {
    position: absolute; left: 34%; top: 22%;
    width: 24%; height: 30%;
    border: 4px solid #1c1e22;
    border-radius: 3px;
    background: #e8ecf3;
    box-shadow: 0 0 26px rgba(120, 160, 220, .35);
    overflow: hidden;
  }
  .screen-big .mini-banner {
    height: 22%;
    background: var(--oa-blue);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255, 255, 255, .85);
    font-size: 8px; letter-spacing: 1px;
  }
  .screen-big .mini-panel {
    margin: 8% auto 0;
    width: 56%; height: 52%;
    background: #fff;
    border: 1px solid #b9c4d4;
    padding: 4% 6%;
  }
  .screen-big .mini-panel i {
    display: block; height: 8%; margin-bottom: 7%;
    background: #dfe4ea; border: 1px solid #c4cdd6;
  }
  .screen-big .mini-panel b {
    display: block; height: 10%;
    background: var(--oa-blue);
  }
  .screen-stand {
    position: absolute; left: 44%; top: 52%;
    width: 4%; height: 5%;
    background: #1c1e22;
  }

  /* 桌上的字条：发现字条的视角（点击后弹出 note-front.html 大图） */
  .the-note {
    position: absolute; left: 56%; top: 50%;
    width: 13%; height: 9%;
    background: linear-gradient(170deg, #f2ede2, #e4ddcd);
    transform: rotate(-9deg);
    box-shadow: 0 2px 6px rgba(0, 0, 0, .5);
    z-index: 5;
    cursor: pointer;
    transition: transform .3s ease, box-shadow .3s ease;
  }
  .the-note::before {  /* 远处看不清的手写行 */
    content: ""; position: absolute; left: 10%; right: 14%; top: 14%; bottom: 16%;
    background: repeating-linear-gradient(0deg,
      transparent 0 3px, rgba(40, 40, 40, .5) 3px 4px, transparent 4px 7px);
    opacity: .6;
  }
  .the-note:hover {
    transform: rotate(-9deg) scale(1.12);
    box-shadow: 0 6px 18px rgba(255, 240, 210, .35);
  }
  .note-hint {
    position: absolute; left: 54%; top: 61%;
    font-size: 11px; color: rgba(230, 225, 210, .55);
    letter-spacing: 1px;
    z-index: 5;
  }

  /* 桌角杂物 */
  .pen { position: absolute; left: 50%; top: 55%; width: 7%; height: 2px; background: #2a2d33; transform: rotate(14deg); z-index: 5; }
  .cup-s05 {
    position: absolute; left: 29%; top: 46%;
    width: 4%; height: 6%;
    background: linear-gradient(90deg, #8f8b83, #b0aca4, #8a867e);
    border-radius: 0 0 3px 3px;
  }

  /* 椅子（桌后） */
  .chair-s05 {
    position: absolute; left: 42%; top: 38%;
    width: 10%; height: 14%;
    background: linear-gradient(180deg, #33363c, #24262b);
    border-radius: 4px 4px 0 0;
  }

  /* 玻璃墙外：办公区三台显示器的冷光余晖 */
  .outer-glow {
    position: absolute; top: 26%;
    width: 7%; height: 9%;
    background: #223246;
    border: 2px solid #15171b;
    box-shadow: 0 0 16px rgba(120, 160, 220, .18);
    opacity: .8;
  }
  .og1 { right: 6%; } .og2 { right: 15%; top: 30%; } .og3 { right: 24%; top: 27%; }

  /* 暖光之外的冷暗部 */
  .cold-dim { position: absolute; inset: 0; background: rgba(20, 26, 40, .22); pointer-events: none; }
</style>
</head>
<body>
<div class="scene s05 vignette">
  <div class="outer-glow og1"></div>
  <div class="outer-glow og2"></div>
  <div class="outer-glow og3"></div>

  <div class="glass-door">
    <div class="name-tag">敖曼 产品经理</div>
    <div class="handle"></div>
  </div>

  <div class="chair-s05"></div>

  <div class="screen-big">
    <div class="mini-banner">临川民生集团协同办公平台</div>
    <div class="mini-panel"><i></i><i></i><b></b></div>
  </div>
  <div class="screen-stand"></div>

  <div class="desk-main"></div>
  <div class="warm-pool"></div>

  <div class="lamp">
    <div class="base"></div>
    <div class="arm"></div>
    <div class="head"></div>
  </div>

  <div class="cup-s05"></div>
  <div class="pen"></div>

  <a class="the-note" href="../documents/note-front.html" title="查看字条"></a>
  <div class="note-hint">一张手写的纸</div>

  <div class="cold-dim"></div>
</div>
</body>
</html>
